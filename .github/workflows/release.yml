name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build ZIP
        run: make zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: anki.zip
